_schema-version: 3.3.0
ID: localemailapp2
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: localemailapp2-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: localemailapp2-db
      - name: localemailapp2-destination
      - name: localemailapp2-xsuaa

  - name: localemailapp2-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: localemailapp2-db

  - name: localemailapp2-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: srv-api
      - name: localemailapp2-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: localemailapp2browse
          artifacts:
            - browse.zip
          target-path: app/

  - name: localemailapp2browse
    type: html5
    path: app/browse
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: localemailapp2-destinations
    type: com.sap.application.content
    requires:
      - name: localemailapp2-html5-repo-host
        parameters:
          service-key:
            name: localemailapp2-html5-repo-host-key
      - name: srv-api
      - name: localemailapp2-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: localemailapp2-html5-repository
              ServiceInstanceName: localemailapp2-html5-repo-host
              ServiceKeyName: localemailapp2-html5-repo-host-key
              sap.cloud.service: localemailapp2.service

resources:
  - name: localemailapp2-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: localemailapp2-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: OAuth2UserTokenExchange
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
                tokenServiceInstanceName: localemailapp2-xsuaa
                tokenServiceKeyName: localemailapp2-xsuaa-key
    requires:
      - name: srv-api
      - name: localemailapp2-xsuaa

  - name: localemailapp2-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: localemailapp2-html5-repo-rt
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: localemailapp2-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: localemailapp2-${org}-${space}
        tenant-mode: dedicated
    requires:
      - name: localemailapp2-html5-repo-rt
    parameters:
      service-keys:
        - name: localemailapp2-xsuaa-key
