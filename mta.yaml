_schema-version: 3.3.0
ID: zbmsds9200
version: 1.0.2
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: zbmsds9200-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      routes:
        - route: zbmsds9200-srv.${default-domain}
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: https://zbmsds9200-srv.${default-domain}
    requires:
      - name: zbmsds9200-db
      - name: zbmsds9200-destination
      - name: zbmsds9200-xsuaa

  - name: zbmsds9200-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: zbmsds9200-db

  - name: zbmsds9200-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: zbmsds9200-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: zbmsds9200browse
          artifacts:
            - zbmsds9200browse.zip
          target-path: resources/

  - name: zbmsds9200browse
    type: html5
    path: app/browse
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: zbmsds9200-destinations
    type: com.sap.application.content
    requires:
      - name: zbmsds9200-html5-repo-host
        parameters:
          service-key:
            name: zbmsds9200-html5-repo-host-key
      - name: zbmsds9200-xsuaa
        parameters:
          service-key:
            name: zbmsds9200-xsuaa-key
      - name: zbmsds9200-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: zbmsds9200-html5-repository
              ServiceInstanceName: zbmsds9200-html5-repo-host
              ServiceKeyName: zbmsds9200-html5-repo-host-key
              sap.cloud.service: zbmsds9200.service
            - Name: zbmsds9200-uaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: zbmsds9200-xsuaa
              ServiceKeyName: zbmsds9200-xsuaa-key
              sap.cloud.service: zbmsds9200.service

resources:
  - name: zbmsds9200-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: zbmsds9200-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-name: zbmsds9200-destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api
      - name: zbmsds9200-xsuaa

  - name: zbmsds9200-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: zbmsds9200-html5-repo-host
      service-plan: app-host

  - name: zbmsds9200-html5-repo-rt
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: zbmsds9200-html5-repo-rt
      service-plan: app-runtime

  - name: zbmsds9200-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-name: zbmsds9200-xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: zbmsds9200-dev
        tenant-mode: dedicated
      service-keys:
        - name: zbmsds9200-xsuaa-key
    requires:
      - name: zbmsds9200-html5-repo-rt
